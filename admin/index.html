<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판다율 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FEFCE8;--surface:#FFFFFF;--lav:#D8C9FF;--lav-dk:#A78BDB;--lav-lt:#F3EEFF;
  --yellow:#FDE68A;--pink:#FFD6EC;--pink-lt:#FFF4FA;
  --text:#3D2F60;--text-sub:#9183B0;--text-mut:#C0B6D6;--border:#EDE6FF;
  --red:#FCA5A5;--red-dk:#EF4444;--green:#86EFAC;--green-dk:#22C55E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--surface);border:1.5px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(167,139,219,.12);}
.login-logo{font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,#A78BDB,#E88BB5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.login-sub{text-align:center;font-size:12px;color:var(--text-sub);margin-bottom:24px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;margin-bottom:14px;font-family:inherit;}
.form-input:focus{border-color:var(--lav-dk);}
.btn-primary{width:100%;padding:11px;background:var(--lav);color:var(--text);border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:var(--lav-dk);color:#fff;box-shadow:0 4px 14px rgba(167,139,219,.3);}
.login-err{font-size:12px;color:var(--red-dk);text-align:center;margin-top:10px;display:none;}

/* ADMIN */
#adminScreen{display:none;}
.admin-header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(167,139,219,.08);}
.admin-logo{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,#A78BDB,#E88BB5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.btn-logout{padding:6px 14px;border:1.5px solid var(--border);border-radius:100px;background:var(--surface);font-size:12px;font-weight:600;color:var(--text-sub);cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--red-dk);color:var(--red-dk);}

/* TABS */
.tab-bar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:14px 22px;font-size:14px;font-weight:600;color:var(--text-sub);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;position:relative;bottom:-1.5px;}
.tab-btn.active{color:var(--lav-dk);border-bottom-color:var(--lav-dk);}
.tab-btn:hover:not(.active){color:var(--text);}
.tab-content{display:none;max-width:960px;margin:0 auto;padding:28px 20px;}
.tab-content.active{display:block;}

/* COMMON */
.section-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:0 2px 10px rgba(167,139,219,.06);}
.section-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--text);margin-bottom:16px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:600px){.row2,.row3{grid-template-columns:1fr;}}
label{font-size:12px;font-weight:600;color:var(--text-sub);display:block;margin-bottom:4px;}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--lav-dk);}
textarea{resize:vertical;min-height:72px;}
.btn{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-add{background:var(--lav);color:var(--text);}
.btn-add:hover{background:var(--lav-dk);color:#fff;box-shadow:0 4px 12px rgba(167,139,219,.3);}
.btn-del{background:#FEE2E2;color:var(--red-dk);font-size:12px;padding:5px 12px;border-radius:8px;border:none;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-del:hover{background:var(--red-dk);color:#fff;}
.btn-edit{background:var(--lav-lt);color:var(--lav-dk);font-size:12px;padding:5px 12px;border-radius:8px;border:none;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-edit:hover{background:var(--lav);color:var(--text);}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--lav-lt);padding:10px 14px;text-align:left;font-weight:700;color:var(--lav-dk);font-size:12px;white-space:nowrap;}
tbody tr{border-top:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:var(--lav-lt);}
tbody td{padding:10px 14px;vertical-align:middle;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;}
.empty-row td{text-align:center;color:var(--text-mut);padding:28px;}

/* COLOR SEL */
.color-sel{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.color-dot.selected{border-color:var(--text);transform:scale(1.2);}

/* STARS */
.star-row{display:flex;gap:4px;margin-top:4px;}
.star{font-size:22px;cursor:pointer;color:#E5E7EB;transition:color .1s;line-height:1;}
.star.on{color:#A78BDB;}

/* GENRE TABS */
.genre-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.genre-tab{padding:7px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;transition:all .2s;}
.genre-tab.active{background:var(--lav);border-color:var(--lav);color:var(--text);box-shadow:0 2px 8px rgba(167,139,219,.25);}

/* UPBO */
.member-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;transition:all .2s;}
.member-row:hover{border-color:var(--lav);}
.member-nick{font-weight:600;font-size:14px;}
.member-uid{font-size:11px;color:var(--text-sub);}
.coins-badge{background:var(--yellow);color:#92400E;font-size:11px;font-weight:700;padding:2px 10px;border-radius:100px;border:1px solid var(--border2,#FDE68A);white-space:nowrap;}
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-top:12px;}
.task-item{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;}
.task-name{font-size:12px;font-weight:600;margin-bottom:6px;}
.qty-row{display:flex;align-items:center;gap:6px;}
.qty-btn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-weight:700;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.qty-btn:hover{border-color:var(--lav-dk);background:var(--lav-lt);}
.qty-val{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;min-width:24px;text-align:center;}
.task-memo-input{font-size:11px;padding:4px 8px;margin-top:6px;min-height:auto;}

/* MODAL */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal.open{display:flex;}
.modal-box{background:var(--surface);border-radius:20px;padding:26px;max-width:440px;width:93%;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title-txt{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-mut);cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#3D2F60;color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">판다율 🐼</div>
    <div class="login-sub">관리자 페이지</div>
    <label class="form-label">이메일</label>
    <input class="form-input" type="email" id="loginEmail" placeholder="admin@example.com">
    <label class="form-label">비밀번호</label>
    <input class="form-input" type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()">
    <button class="btn-primary" onclick="handleLogin()">로그인</button>
    <div class="login-err" id="loginErr">이메일 또는 비밀번호를 확인해주세요</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <div class="admin-logo">판다율 관리자 🐼</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:12px;color:var(--text-sub);" id="adminEmail"></span>
      <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('schedule')">📅 스케줄</button>
    <button class="tab-btn" onclick="switchTab('song')">🎵 노래책</button>
    <button class="tab-btn" onclick="switchTab('upbo')">📋 업보</button>
    <button class="tab-btn" onclick="switchTab('overlay')">🎤 오버레이</button>
  </div>

  <!-- ══ 스케줄 ══ -->
  <div class="tab-content active" id="tab-schedule">
    <div class="section-card">
      <div class="section-title">➕ 일정 추가</div>
      <div class="row3">
        <div><label>날짜</label><input type="date" id="sDate"></div>
        <div><label>시간 (선택)</label><input type="time" id="sTime"></div>
        <div><label>유형</label>
          <select id="sType">
            <option value="broadcast">방송</option><option value="rest">휴방</option>
            <option value="event">이벤트</option><option value="collab">합방</option>
            <option value="tournament">대회</option><option value="other">기타</option>
          </select>
        </div>
      </div>
      <div style="margin-top:10px;"><label>제목</label><input type="text" id="sTitle" placeholder="방송 제목"></div>
      <div style="margin-top:10px;"><label>설명 (선택)</label><textarea id="sDesc" placeholder="추가 설명"></textarea></div>
      <div style="margin-top:10px;">
        <label>색상</label>
        <div class="color-sel" id="colorSel">
          <div class="color-dot selected" style="background:#A78BDB" data-color="#A78BDB"></div>
          <div class="color-dot" style="background:#C0B6D6" data-color="#C0B6D6"></div>
          <div class="color-dot" style="background:#F9A8D4" data-color="#F9A8D4"></div>
          <div class="color-dot" style="background:#86EFAC" data-color="#86EFAC"></div>
          <div class="color-dot" style="background:#93C5FD" data-color="#93C5FD"></div>
          <div class="color-dot" style="background:#FCD34D" data-color="#FCD34D"></div>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:12px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0;font-size:12px;">
          <input type="checkbox" id="sHighlight"> 강조 표시
        </label>
        <button class="btn btn-add" style="margin-left:auto;" onclick="addSchedule()">추가</button>
      </div>
    </div>
    <div class="section-card">
      <div class="section-title">📅 일정 목록</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <input type="month" id="sFilterMonth" style="width:auto;">
        <button class="btn btn-add" onclick="loadSchedules()">조회</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>날짜</th><th>시간</th><th>유형</th><th>제목</th><th>관리</th></tr></thead>
          <tbody id="scheduleBody"><tr class="empty-row"><td colspan="5">조회 버튼을 눌러주세요</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ 노래책 ══ -->
  <div class="tab-content" id="tab-song">
    <div class="section-card">
      <div class="section-title">➕ 곡 추가</div>
      <div class="row3">
        <div><label>장르</label>
          <select id="songGenre">
            <option value="kpop">케이팝</option><option value="jpop">제이팝</option>
            <option value="pop">팝</option><option value="aegyo">애교송</option>
          </select>
        </div>
        <div><label>아티스트</label><input type="text" id="songArtist" placeholder="아티스트명"></div>
        <div><label>제목</label><input type="text" id="songTitle" placeholder="곡 제목"></div>
      </div>
      <div class="row2" style="margin-top:10px;">
        <div>
          <label>난이도</label>
          <div class="star-row" id="addStars">
            <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span>
          </div>
          <input type="hidden" id="songLevel" value="0">
        </div>
        <div style="display:flex;align-items:flex-end;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0;font-size:12px;">
            <input type="checkbox" id="songSig"> 시그니처 🎀
          </label>
        </div>
      </div>
      <div style="margin-top:10px;"><label>메모 (선택)</label><input type="text" id="songMemo" placeholder="메모"></div>
      <div style="margin-top:14px;text-align:right;"><button class="btn btn-add" onclick="addSong()">추가</button></div>
    </div>
    <div class="section-card">
      <div class="section-title">🎵 곡 목록</div>
      <div class="genre-tabs" id="songGenreTabs">
        <button class="genre-tab active" data-genre="kpop">케이팝</button>
        <button class="genre-tab" data-genre="jpop">제이팝</button>
        <button class="genre-tab" data-genre="pop">팝</button>
        <button class="genre-tab" data-genre="aegyo">애교송</button>
      </div>
      <div style="margin-bottom:12px;"><input type="text" id="songSearch" placeholder="🔍 검색..." oninput="filterSongs()"></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>아티스트</th><th>제목</th><th>난이도</th><th>메모</th><th>관리</th></tr></thead>
          <tbody id="songBody"><tr class="empty-row"><td colspan="5">로딩 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ 업보 ══ -->
  <div class="tab-content" id="tab-upbo">
    <div class="section-card">
      <div class="section-title">🏷️ 업보 타입 관리</div>
      <div class="row3">
        <div><label>타입명</label><input type="text" id="typeNm" placeholder="예: 개인방송 늦음"></div>
        <div><label>카테고리</label>
          <select id="typeCat"><option value="normal">일반</option><option value="event">이벤트</option></select>
        </div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-add" onclick="addTaskType()">추가</button></div>
      </div>
      <div style="margin-top:14px;" id="typeList"></div>
    </div>
    <div class="section-card">
      <div class="section-title">👥 시청자 관리</div>
      <div class="row3">
        <div><label>닉네임</label><input type="text" id="memberNick" placeholder="닉네임"></div>
        <div><label>유저ID</label><input type="text" id="memberUid" placeholder="user_id"></div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-add" onclick="addMember()">추가</button></div>
      </div>
      <div style="margin-top:10px;"><input type="text" id="memberSearch" placeholder="🔍 시청자 검색..." oninput="filterMembers()"></div>
      <div style="margin-top:12px;" id="memberList"></div>
    </div>
    <div class="section-card">
      <div class="section-title">📋 업보 할당</div>
      <div style="margin-bottom:14px;">
        <label>시청자 선택</label>
        <select id="memberSel" onchange="loadMemberTasks()"><option value="">-- 선택 --</option></select>
      </div>
      <div id="taskGrid" class="task-grid"></div>
      <div style="margin-top:16px;">
        <label>🪙 코인 지급/차감</label>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <input type="number" id="coinAmount" placeholder="숫자 입력 (음수=차감)" style="flex:1;">
          <button class="btn btn-add" onclick="updateCoins()">적용</button>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-del" onclick="clearAllTasks()">전체 초기화</button>
        <button class="btn btn-add" onclick="saveTasks()">💾 저장</button>
      </div>
    </div>
    <div class="section-card">
      <div class="section-title">📅 갱신일 설정</div>
      <div style="display:flex;gap:8px;">
        <input type="date" id="upboDate" style="flex:1;">
        <button class="btn btn-add" onclick="saveUpboDate()">저장</button>
      </div>
    </div>
  </div>

  <!-- ══ 오버레이 ══ -->
  <div class="tab-content" id="tab-overlay">
    <div class="section-card">
      <div class="section-title">🎤 오버레이 등록</div>
      <div style="margin-bottom:10px;"><label>곡 제목</label><input type="text" id="ovTitle" placeholder="곡 제목"></div>
      <div style="margin-bottom:14px;"><label>아티스트</label><input type="text" id="ovArtist" placeholder="아티스트명"></div>
      <button class="btn btn-add" onclick="publishOverlay()">🎤 등록 + 히스토리 추가</button>
    </div>
    <div class="section-card">
      <div class="section-title">📜 최근 오버레이 히스토리 (최대 5개)</div>
      <div id="overlayHistory"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="editModal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title-txt" id="editModalTitle">편집</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div id="editModalBody"></div>
  </div>
</div>

<script src="/js/supabase-config.js"></script>
<script>
// ── AUTH ──
async function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const{data,error}=await supabaseClient.auth.signInWithPassword({email,password:pw});
  if(error){document.getElementById('loginErr').style.display='block';return;}
  showAdmin(data.user);
}
async function handleLogout(){
  await supabaseClient.auth.signOut();
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}
function showAdmin(user){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminScreen').style.display='block';
  document.getElementById('adminEmail').textContent=user.email;
  initAll();
}
supabaseClient.auth.getSession().then(({data:{session}})=>{if(session)showAdmin(session.user);});

// ── TAB ──
function switchTab(name){
  const names=['schedule','song','upbo','overlay'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',names[i]===name));

}

}

// SCHEDULE
// ════════════════════════
const TL={broadcast:'방송',rest:'휴방',event:'이벤트',collab:'합방',tournament:'대회',other:'기타'};
const TC={broadcast:'#A78BDB',rest:'#C0B6D6',event:'#F9A8D4',collab:'#86EFAC',tournament:'#93C5FD',other:'#FCD34D'};
const DOW=['일','월','화','수','목','금','토'];
let scheduleData=[];

async function loadSchedules(){
  const m=document.getElementById('sFilterMonth').value;
  if(!m)return;
  const[y,mo]=m.split('-');
  const last=new Date(parseInt(y),parseInt(mo),0).getDate();
  const s=`${y}-${mo}-01`,e=`${y}-${mo}-${String(last).padStart(2,'0')}`;
  const{data}=await supabaseClient.from('schedules').select('*').gte('event_date',s).lte('event_date',e).order('event_date').order('event_time');
  scheduleData=data||[];renderScheduleTable();
}

function renderScheduleTable(){
  const tb=document.getElementById('scheduleBody');
  if(!scheduleData.length){tb.innerHTML='<tr class="empty-row"><td colspan="5">일정이 없어요</td></tr>';return;}
  tb.innerHTML=scheduleData.map(s=>{
    const dt=new Date(s.event_date+'T00:00:00');
    const c=s.color||TC[s.event_type]||'#A78BDB',l=TL[s.event_type]||s.event_type;
    return `<tr>
      <td>${s.event_date} (${DOW[dt.getDay()]})</td>
      <td>${s.event_time?s.event_time.slice(0,5):'-'}</td>
      <td><span class="badge" style="background:${c}22;color:${c};">${l}</span></td>
      <td>${s.title}${s.highlight?' ✨':''}</td>
      <td><div style="display:flex;gap:6px;">
        <button class="btn-edit" onclick="editSchedule(${s.id})">수정</button>
        <button class="btn-del" onclick="delSchedule(${s.id})">삭제</button>
      </div></td>
    </tr>`;
  }).join('');
}

async function addSchedule(){
  const date=document.getElementById('sDate').value,title=document.getElementById('sTitle').value.trim();
  if(!date||!title){toast('날짜와 제목을 입력해주세요');return;}
  const{error}=await supabaseClient.from('schedules').insert([{
    event_date:date,event_time:document.getElementById('sTime').value||null,
    event_type:document.getElementById('sType').value,title,
    description:document.getElementById('sDesc').value.trim()||null,
    color:selectedColor,highlight:document.getElementById('sHighlight').checked
  }]);
  if(error){toast('추가 실패: '+error.message);return;}
  toast('✅ 일정 추가!');
  ['sDate','sTime','sTitle','sDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sHighlight').checked=false;
  loadSchedules();
}

async function delSchedule(id){
  if(!confirm('삭제할까요?'))return;
  await supabaseClient.from('schedules').delete().eq('id',id);
  toast('🗑️ 삭제됨');loadSchedules();
}

function editSchedule(id){
  const s=scheduleData.find(x=>x.id===id);if(!s)return;
  document.getElementById('editModalTitle').textContent='일정 수정';
  document.getElementById('editModalBody').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div><label>날짜</label><input type="date" id="eDate" value="${s.event_date}"></div>
      <div><label>시간</label><input type="time" id="eTime" value="${s.event_time?s.event_time.slice(0,5):''}"></div>
      <div><label>유형</label><select id="eType">${Object.entries(TL).map(([v,l])=>`<option value="${v}"${s.event_type===v?' selected':''}>${l}</option>`).join('')}</select></div>
      <div><label>제목</label><input type="text" id="eTitle" value="${s.title}"></div>
      <div><label>설명</label><textarea id="eDesc">${s.description||''}</textarea></div>

async function saveScheduleEdit(id){
  const{error}=await supabaseClient.from('schedules').update({
    event_date:document.getElementById('eDate').value,
    event_time:document.getElementById('eTime').value||null,
    event_type:document.getElementById('eType').value,

  toast('✅ 수정됨');closeEditModal();loadSchedules();

let taskTypes=[],allMembers=[],memberTaskState={};

async function loadTaskTypes(){

  taskTypes=data||[];renderTypeList();
}

function renderTypeList(){

  if(!taskTypes.length){el.innerHTML='<div style="color:var(--text-mut);font-size:13px;">타입이 없어요</div>';return;}

async function addTaskType(){

  toast('✅ 타입 추가!');document.getElementById('typeNm').value='';loadTaskTypes();
}

async function delTaskType(id){
  if(!confirm('삭제할까요?'))return;
  await supabaseClient.from('upbo_task_types').delete().eq('id',id);
  toast('🗑️ 삭제됨');loadTaskTypes();
}

async function loadMembers(){

  allMembers=data||[];renderMemberList(allMembers);
  const sel=document.getElementById('memberSel');

function renderMemberList(list){

function filterMembers(){

}

async function addMember(){

async function delMember(id){
  if(!confirm('삭제할까요? 관련 업보도 모두 삭제됩니다.'))return;
  await supabaseClient.from('upbo_members').delete().eq('id',id);
  toast('🗑️ 삭제됨');loadMembers();
}

function editMember(id){
  const m=allMembers.find(x=>x.id===id);if(!m)return;
  document.getElementById('editModalTitle').textContent='시청자 수정';
  document.getElementById('editModalBody').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div><label>닉네임</label><input type="text" id="eNick" value="${m.nickname}"></div>
      <div><label>유저ID</label><input type="text" id="eUid" value="${m.user_id}"></div>
      <div style="text-align:right;"><button class="btn btn-add" onclick="saveMemberEdit(${id})">저장</button></div>
    </div>`;
  document.getElementById('editModal').classList.add('open');
}

async function saveMemberEdit(id){
  const{error}=await supabaseClient.from('upbo_members').update({
    nickname:document.getElementById('eNick').value.trim(),
    user_id:document.getElementById('eUid').value.trim()
  }).eq('id',id);
  if(error){toast('수정 실패');return;}
  toast('✅ 수정됨');closeEditModal();loadMembers();
}

async function loadMemberTasks(){
  const memberId=document.getElementById('memberSel').value;
  const grid=document.getElementById('taskGrid');
  memberTaskState={};
  if(!memberId){grid.innerHTML='';return;}
  const{data:existing}=await supabaseClient.from('upbo_tasks').select('*').eq('member_id',memberId);
  (existing||[]).forEach(t=>{memberTaskState[t.task_type_id]={qty:t.quantity,memo:t.memo||'',existingId:t.id};});
  const active=taskTypes.filter(t=>t.is_active);
  if(!active.length){grid.innerHTML='<div style="color:var(--text-mut);font-size:13px;">업보 타입을 먼저 추가해주세요</div>';return;}
  grid.innerHTML=active.map(t=>{
    const cur=memberTaskState[t.id]||{qty:0,memo:''};
    return `<div class="task-item">
      <div class="task-name">${t.name} <span class="badge" style="background:${t.category==='event'?'#FDE8F0':'var(--lav-lt)'};color:${t.category==='event'?'#BE185D':'var(--lav-dk)'};">${t.category==='event'?'이벤트':'일반'}</span></div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(${t.id},-1)">−</button>
        <span class="qty-val" id="qty-${t.id}">${cur.qty}</span>
        <button class="qty-btn" onclick="changeQty(${t.id},1)">+</button>
      </div>
      <input class="task-memo-input" type="text" placeholder="메모" id="memo-${t.id}" value="${cur.memo}">
    </div>`;
  }).join('');
  const member=allMembers.find(m=>m.id===parseInt(memberId));
  if(member)document.getElementById('coinAmount').placeholder=`현재 ${member.coins||0}개 (± 입력)`;
}

function changeQty(typeId,delta){
  if(!memberTaskState[typeId])memberTaskState[typeId]={qty:0,memo:'',existingId:null};
  memberTaskState[typeId].qty=Math.max(0,(memberTaskState[typeId].qty||0)+delta);
  document.getElementById(`qty-${typeId}`).textContent=memberTaskState[typeId].qty;
}

async function saveTasks(){
  const memberId=document.getElementById('memberSel').value;
  if(!memberId){toast('시청자를 선택해주세요');return;}
  for(const t of taskTypes.filter(x=>x.is_active)){
    const qty=parseInt(document.getElementById(`qty-${t.id}`)?.textContent||0);
    const memo=document.getElementById(`memo-${t.id}`)?.value||'';
    const cur=memberTaskState[t.id]||{};
    if(cur.existingId){
      if(qty===0)await supabaseClient.from('upbo_tasks').delete().eq('id',cur.existingId);
      else await supabaseClient.from('upbo_tasks').update({quantity:qty,memo}).eq('id',cur.existingId);
    }else if(qty>0){
      await supabaseClient.from('upbo_tasks').insert([{member_id:parseInt(memberId),task_type_id:t.id,quantity:qty,memo}]);
    }
  }
  toast('💾 저장 완료!');loadMemberTasks();
}

async function clearAllTasks(){
  const memberId=document.getElementById('memberSel').value;
  if(!memberId){toast('시청자를 선택해주세요');return;}
  if(!confirm('이 시청자의 모든 업보를 초기화할까요?'))return;
  await supabaseClient.from('upbo_tasks').delete().eq('member_id',memberId);
  toast('🗑️ 초기화됨');loadMemberTasks();
}

async function updateCoins(){
  const memberId=document.getElementById('memberSel').value;
  if(!memberId){toast('시청자를 선택해주세요');return;}
  const amount=parseInt(document.getElementById('coinAmount').value);
  if(isNaN(amount)){toast('숫자를 입력해주세요');return;}
  const member=allMembers.find(m=>m.id===parseInt(memberId));
  if(!member)return;
  const newCoins=Math.max(0,(member.coins||0)+amount);
  const{error}=await supabaseClient.from('upbo_members').update({coins:newCoins}).eq('id',parseInt(memberId));
  if(error){toast('실패: '+error.message);return;}
  toast(`🪙 ${amount>=0?'+':''}${amount} → 총 ${newCoins}개`);
  document.getElementById('coinAmount').value='';
  await loadMembers();
  document.getElementById('memberSel').value=memberId;
  loadMemberTasks();
}

async function saveUpboDate(){
  const v=document.getElementById('upboDate').value;if(!v)return;
  await supabaseClient.from('upbo_settings').upsert({key:'last_updated',value:v,updated_at:new Date().toISOString()},{onConflict:'key'});
  toast('✅ 갱신일 저장!');
}

async function publishOverlay(){
  const title=document.getElementById('ovTitle').value.trim();
  const artist=document.getElementById('ovArtist').value.trim();
  if(!title){toast('곡 제목을 입력해주세요');return;}
  await supabaseClient.from('recent_overlays').insert([{song_title:title,song_artist:artist}]);
  const{data:all}=await supabaseClient.from('recent_overlays').select('id').order('played_at',{ascending:false});
  if(all&&all.length>5){
    const ids=all.slice(5).map(r=>r.id);
    await supabaseClient.from('recent_overlays').delete().in('id',ids);
  }
  toast('🎤 오버레이 등록!');
  document.getElementById('ovTitle').value='';document.getElementById('ovArtist').value='';
  loadOverlayHistory();
}

async function loadOverlayHistory(){
  const{data}=await supabaseClient.from('recent_overlays').select('*').order('played_at',{ascending:false}).limit(5);
  const el=document.getElementById('overlayHistory');
  if(!data||!data.length){el.innerHTML='<div style="color:var(--text-mut);font-size:13px;padding:12px 0;">기록이 없어요</div>';return;}
  el.innerHTML=data.map((r,i)=>{
    const d=new Date(r.played_at);
    const ds=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;">
      <span style="font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-mut);min-width:22px;">0${i+1}</span>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;">${r.song_title}</div>
        <div style="font-size:12px;color:var(--text-sub);">${r.song_artist||''}</div>
      </div>
      <span style="font-size:11px;color:var(--text-mut);">${ds}</span>
      <button class="btn-del" onclick="delOverlay(${r.id})">삭제</button>
    </div>`;
  }).join('');
}

async function delOverlay(id){
  await supabaseClient.from('recent_overlays').delete().eq('id',id);
  toast('🗑️ 삭제됨');loadOverlayHistory();
}

function closeEditModal(){document.getElementById('editModal').classList.remove('open');}
</script>
</body>
</html>

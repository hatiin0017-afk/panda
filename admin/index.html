<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판다율 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<style>
body { background: var(--bg); }

/* LOGIN */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 24px; padding: 36px; width: 100%; max-width: 360px;
  box-shadow: 0 8px 32px var(--shadow);
}
.login-title { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; margin-bottom:20px; color:var(--text); }

/* ADMIN LAYOUT */
#adminScreen { display: none; }
.admin-header {
  background: rgba(254,252,232,.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.admin-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; color:var(--text); }
.logout-btn {
  padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 700;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text-sub); cursor: pointer; transition: all .2s;
}
.logout-btn:hover { border-color: var(--lav); color: var(--lav-dk); }

/* MAIN TABS */
.main-tabs {
  display: flex; gap: 0; border-bottom: 1.5px solid var(--border);
  padding: 0 24px; background: var(--surface);
}
.main-tab {
  padding: 14px 22px; font-size: 13px; font-weight: 700;
  color: var(--text-sub); cursor: pointer; border-bottom: 2.5px solid transparent;
  transition: all .2s; margin-bottom: -1.5px;
}
.main-tab:hover { color: var(--lav-dk); }
.main-tab.active { color: var(--lav-dk); border-bottom-color: var(--lav-dk); }

.tab-panel { display: none; padding: 28px 24px; max-width: 900px; margin: 0 auto; }
.tab-panel.active { display: block; }

/* FORM ELEMENTS */
.form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text-mut); letter-spacing: .8px; text-transform: uppercase; }
.form-input {
  padding: 9px 13px; border-radius: 11px;
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 13px; color: var(--text); outline: none; font-family: inherit;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--lav-dk); }
select.form-input { cursor: pointer; }
.form-input.full { width: 100%; }

/* BUTTONS */
.btn {
  padding: 9px 20px; border-radius: 11px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .2s; border: none; font-family: inherit;
}
.btn-primary { background: var(--lav-dk); color: #fff; }
.btn-primary:hover { background: #9270c9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(167,139,219,.4); }
.btn-secondary { background: var(--surface); color: var(--text-sub); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--lav); color: var(--lav-dk); }
.btn-danger { background: #FEE2E2; color: #DC2626; border: 1.5px solid #FECACA; }
.btn-danger:hover { background: #FCA5A5; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }

/* PANEL CARD */
.panel-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 20px; margin-bottom: 20px;
  box-shadow: 0 2px 8px var(--shadow);
}
.panel-card-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* TABLE */
.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th {
  padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700;
  color: var(--text-mut); letter-spacing: 1px; text-transform: uppercase;
  background: var(--lav-lt); border-bottom: 1.5px solid var(--border);
}
.admin-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(216,201,255,.2); }
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: var(--lav-lt); }
.table-wrap2 {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; overflow: hidden; margin-top: 12px;
}

/* STARS */
.star-row { display: flex; gap: 4px; }
.star { font-size: 22px; cursor: pointer; color: #EDE6FF; transition: color .15s; }
.star.on { color: #A78BDB; }

/* OVERLAY PANEL */
.overlay-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; padding: 4px 12px;
  border-radius: 100px;
}
.overlay-status.on  { background: #D1FAE5; color: #065F46; }
.overlay-status.off { background: var(--lav-lt); color: var(--text-sub); }

/* SUB TABS (노래책 장르) */
.sub-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.sub-tab {
  padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--bg);
  color: var(--text-sub); cursor: pointer; transition: all .2s;
}
.sub-tab:hover { border-color: var(--lav); }
.sub-tab.active { background: var(--lav); border-color: var(--lav); color: var(--text); }

/* INQUIRY BADGE */
.inq-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: #F9A8D4; color: #9D174D; font-size: 10px; font-weight: 800;
  margin-left: 6px; vertical-align: middle;
}

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; background: var(--text); color: #fff;
  border-radius: 12px; font-size: 13px; font-weight: 600;
  z-index: 9999; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.toast.show { opacity: 1; }

/* EDIT MODAL */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(61,47,96,.3); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal-box {
  background: var(--surface); border-radius: 20px;
  padding: 26px; max-width: 460px; width: 90%;
  box-shadow: 0 20px 60px rgba(61,47,96,.2);
  border: 1.5px solid var(--border); max-height: 90vh; overflow-y: auto;
}

@media (max-width: 600px) {
  .tab-panel { padding: 16px; }
  .main-tab { padding: 12px 14px; font-size: 12px; }
  .form-row { flex-direction: column; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">🐼 판다율 관리자</div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">이메일</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="admin@email.com">
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label class="form-label">비밀번호</label>
      <input class="form-input" id="loginPw" type="password" placeholder="••••••••">
    </div>
    <div id="loginErr" style="display:none;font-size:12px;color:#DC2626;margin-bottom:12px"></div>
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">로그인</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <div class="admin-title">🐼 판다율 관리자</div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="userEmail" style="font-size:12px;color:var(--text-sub)"></span>
      <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>
  </div>

  <!-- Main Tabs -->
  <div class="main-tabs">
    <div class="main-tab active" onclick="switchTab('schedule')">📅 스케줄</div>
    <div class="main-tab" onclick="switchTab('song')">🎵 노래책</div>
    <div class="main-tab" onclick="switchTab('work')">💫 업보</div>
    <div class="main-tab" onclick="switchTab('overlay')">🎤 오버레이</div>
  </div>

  <!-- ═══════════ SCHEDULE TAB ═══════════ -->
  <div class="tab-panel active" id="tab-schedule">
    <div class="panel-card">
      <div class="panel-card-title">일정 추가</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">날짜</label>
          <input class="form-input" id="sDate" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">시간</label>
          <input class="form-input" id="sTime" type="time">
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">제목</label>
          <input class="form-input" id="sTitle" type="text" placeholder="방송 제목">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">타입</label>
          <select class="form-input" id="sType">
            <option value="broadcast">방송</option>
            <option value="rest">휴방</option>
            <option value="event">이벤트</option>
            <option value="collab">합방</option>
            <option value="tournament">대회</option>
            <option value="other">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">커스텀 색상</label>
          <input class="form-input" id="sColor" type="color" value="#A78BDB" style="height:38px;padding:4px">
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">설명 (선택)</label>
          <input class="form-input" id="sDesc" type="text" placeholder="부가 설명">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label class="form-label">강조</label>
          <input type="checkbox" id="sHighlight" style="width:18px;height:18px;margin-top:6px">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addSchedule()">일정 추가</button>
    </div>

    <div class="panel-card">
      <div class="panel-card-title">일정 목록</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input class="form-input" id="sFilter" type="month" style="max-width:180px">
        <button class="btn btn-secondary btn-sm" onclick="loadSchedules()">조회</button>
      </div>
      <div class="table-wrap2">
        <table class="admin-table">
          <thead><tr><th>날짜</th><th>시간</th><th>제목</th><th>타입</th><th>관리</th></tr></thead>
          <tbody id="schedBody"><tr><td colspan="5" style="text-align:center;color:var(--text-mut);padding:20px">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════ SONG TAB ═══════════ -->
  <div class="tab-panel" id="tab-song">
    <div class="panel-card">
      <div class="panel-card-title">곡 추가</div>
      <div class="sub-tabs" id="addGenreTabs">
        <button class="sub-tab active" data-genre="kpop">케이팝</button>
        <button class="sub-tab" data-genre="jpop">제이팝</button>
        <button class="sub-tab" data-genre="pop">팝</button>
        <button class="sub-tab" data-genre="aegyo">애교송</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">아티스트</label>
          <input class="form-input" id="songArtist" type="text" placeholder="아티스트명">
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">곡명</label>
          <input class="form-input" id="songTitle" type="text" placeholder="곡명">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">난이도</label>
          <div class="star-row" id="addStars">
            <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
          </div>
          <input type="hidden" id="songLevel" value="0">
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">메모 (선택)</label>
          <input class="form-input" id="songMemo" type="text" placeholder="짧은 메모">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label class="form-label">시그니처</label>
          <input type="checkbox" id="songSig" style="width:18px;height:18px;margin-top:6px">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addSong()">곡 추가</button>
    </div>

    <div class="panel-card">
      <div class="panel-card-title">곡 목록</div>
      <div class="sub-tabs" id="listGenreTabs">
        <button class="sub-tab active" data-genre="kpop">케이팝</button>
        <button class="sub-tab" data-genre="jpop">제이팝</button>
        <button class="sub-tab" data-genre="pop">팝</button>
        <button class="sub-tab" data-genre="aegyo">애교송</button>
      </div>
      <input class="form-input full" id="songSearch" type="text" placeholder="검색..." style="margin-bottom:12px">
      <div class="table-wrap2">
        <table class="admin-table">
          <thead><tr><th>아티스트</th><th>곡명</th><th>난이도</th><th>메모</th><th>시그</th><th>관리</th></tr></thead>
          <tbody id="songBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════ WORK TAB ═══════════ -->
  <div class="tab-panel" id="tab-work">
    <!-- 갱신일 -->
    <div class="panel-card">
      <div class="panel-card-title">갱신일 설정</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" id="upboDate" type="date" style="max-width:180px">
        <button class="btn btn-primary btn-sm" onclick="saveDate()">저장</button>
        <span id="curDate" style="font-size:12px;color:var(--text-sub)"></span>
      </div>
    </div>

    <!-- 멤버 관리 -->
    <div class="panel-card">
      <div class="panel-card-title">시청자 추가</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input class="form-input" id="mNick" type="text" placeholder="닉네임">
        </div>
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input class="form-input" id="mId" type="text" placeholder="user_id">
        </div>
        <div class="form-group">
          <label class="form-label">코인</label>
          <input class="form-input" id="mCoins" type="number" value="0" min="0">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <button class="btn btn-primary" onclick="addMember()" style="margin-top:auto">추가</button>
        </div>
      </div>
      <div class="table-wrap2" style="margin-top:8px">
        <table class="admin-table">
          <thead><tr><th>닉네임</th><th>아이디</th><th>코인</th><th>숨김</th><th>관리</th></tr></thead>
          <tbody id="memberBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 업보 타입 -->
    <div class="panel-card">
      <div class="panel-card-title">업보 타입 관리</div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label class="form-label">타입명</label>
          <input class="form-input" id="typeName" type="text" placeholder="업보 이름">
        </div>
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-input" id="typeCat">
            <option value="normal">일반</option>
            <option value="event">이벤트</option>
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <button class="btn btn-primary" onclick="addType()" style="margin-top:auto">추가</button>
        </div>
      </div>
      <div class="table-wrap2" style="margin-top:8px">
        <table class="admin-table">
          <thead><tr><th>타입명</th><th>카테고리</th><th>활성</th><th>관리</th></tr></thead>
          <tbody id="typeBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 업보 할당 -->
    <div class="panel-card">
      <div class="panel-card-title">업보 할당</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">시청자</label>
          <select class="form-input" id="taskMember"></select>
        </div>
        <div class="form-group">
          <label class="form-label">업보 타입</label>
          <select class="form-input" id="taskType"></select>
        </div>
        <div class="form-group" style="max-width:80px">
          <label class="form-label">수량</label>
          <input class="form-input" id="taskQty" type="number" value="1" min="1">
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">메모</label>
          <input class="form-input" id="taskMemo" type="text" placeholder="선택">
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="assignTask()">업보 추가</button>
        <button class="btn btn-danger btn-sm" onclick="clearAllTasks()">선택 시청자 전체 삭제</button>
      </div>
    </div>

    <!-- 문의 -->
    <div class="panel-card">
      <div class="panel-card-title">문의 목록 <span class="inq-badge" id="inqBadge" style="display:none">0</span></div>
      <div class="table-wrap2">
        <table class="admin-table">
          <thead><tr><th>닉네임</th><th>내용</th><th>날짜</th><th>관리</th></tr></thead>
          <tbody id="inqBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════ OVERLAY TAB ═══════════ -->
  <div class="tab-panel" id="tab-overlay">
    <div class="panel-card">
      <div class="panel-card-title">현재 오버레이</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span class="overlay-status off" id="ovStatus">OFF</span>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label class="form-label">곡명</label>
          <input class="form-input" id="ovTitle" type="text" placeholder="곡 제목">
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">아티스트</label>
          <input class="form-input" id="ovArtist" type="text" placeholder="아티스트">
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="publishOverlay()">🎤 오버레이 ON</button>
        <button class="btn btn-secondary" onclick="hideOverlay()">숨기기</button>
        <button class="btn btn-secondary" onclick="pickRandomOverlay()">🎲 랜덤 곡</button>
      </div>
    </div>

    <div class="panel-card">
      <div class="panel-card-title">최근 오버레이 기록 <span style="font-size:11px;color:var(--text-mut)">(최대 5개)</span></div>
      <div class="table-wrap2">
        <table class="admin-table">
          <thead><tr><th>곡명</th><th>아티스트</th><th>일시</th><th>관리</th></tr></thead>
          <tbody id="ovHistBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal (공용) -->
<div class="modal-backdrop" id="editModal" onclick="closeEditModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="font-weight:800;font-size:15px;margin-bottom:16px;color:var(--text)" id="editModalTitle">편집</div>
    <div id="editModalBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" id="editSaveBtn">저장</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/supabase-config.js"></script>
<script>
// ── UTILS ──
function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function closeEditModal(e){ if(!e||e.target===e.currentTarget) document.getElementById('editModal').classList.remove('open'); }

// ── AUTH ──
async function handleLogin(){
  const email=document.getElementById('loginEmail').value;
  const pw=document.getElementById('loginPw').value;
  const err=document.getElementById('loginErr');

function initStars(wrapId, hiddenId){
  const wrap=document.getElementById(wrapId);
  wrap.querySelectorAll('.star').forEach(s=>{
    s.addEventListener('click',()=>{
      const v=parseInt(s.dataset.v);
      document.getElementById(hiddenId).value=v;
      wrap.querySelectorAll('.star').forEach(st=>st.classList.toggle('on',parseInt(st.dataset.v)<=v));
    });
  });
}
function setStars(wrapId,hiddenId,val){
  document.getElementById(hiddenId).value=val;
  document.getElementById(wrapId).querySelectorAll('.star').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.v)<=val));
}
function starsHtml(n){ let h=''; for(let i=1;i<=5;i++) h+=`<span style="color:${i<=n?'#A78BDB':'#EDE6FF'}">★</span>`; return h; }

// ── SCHEDULE ──
const TYPE_LABELS={broadcast:'방송',rest:'휴방',event:'이벤트',collab:'합방',tournament:'대회',other:'기타'};
const TYPE_COLORS={broadcast:'#A78BDB',rest:'#C0B6D6',event:'#F9A8D4',collab:'#86EFAC',tournament:'#93C5FD',other:'#FCD34D'};

async function loadSchedules(){
  const month=document.getElementById('sFilter').value;
  let q=supabaseClient.from('schedules').select('*').order('event_date').order('event_time');
  if(month){ q=q.gte('event_date',month+'-01').lte('event_date',month+'-31'); }
  const {data}=await q;
  const body=document.getElementById('schedBody');
  if(!data?.length){ body.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--text-mut);padding:20px">일정 없음</td></tr>'; return; }
  body.innerHTML=data.map(s=>{
    const c=s.color||TYPE_COLORS[s.event_type]||'#A78BDB';
    const l=TYPE_LABELS[s.event_type]||s.event_type;
    return `<tr>
      <td>${s.event_date}</td>
      <td>${s.event_time?s.event_time.slice(0,5):'-'}</td>
      <td>${esc(s.title)}${s.highlight?'  ✨':''}</td>
      <td><span style="background:${c}22;color:${c};padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700">${l}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="editSchedule(${JSON.stringify(s).split('"').join('&quot;')})">수정</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSchedule(${s.id})">삭제</button>
      </td>
    </tr>`;
  }).join('');
}

      <button class="btn btn-danger btn-sm" onclick="deleteMember(${m.id})">삭제</button>
    </td>
  </tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--text-mut);padding:20px">시청자 없음</td></tr>';

  // type table
  document.getElementById('typeBody').innerHTML=taskTypes.map(t=>`<tr>
    <td>${esc(t.name)}</td>
    <td><span style="font-size:11px;padding:2px 8px;border-radius:8px;background:${t.category==='event'?'var(--pink-lt)':'var(--lav-lt)'};color:${t.category==='event'?'#BE185D':'var(--lav-dk)'}">${t.category==='event'?'이벤트':'일반'}</span></td>
    <td><input type="checkbox"${t.is_active?' checked':''} onchange="toggleType(${t.id},this.checked)"></td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteType(${t.id})">삭제</button></td>
  </tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--text-mut);padding:20px">타입 없음</td></tr>';

  document.getElementById('taskType').innerHTML=taskTypes.filter(t=>t.is_active).map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');

  loadInquiries();
}

async function assignTask(){
  const memberId=parseInt(document.getElementById('taskMember').value);
  const typeId=parseInt(document.getElementById('taskType').value);
  const qty=parseInt(document.getElementById('taskQty').value)||1;
  const memo=document.getElementById('taskMemo').value.trim()||null;
  if(!memberId||!typeId){ toast('시청자와 타입을 선택해주세요'); return; }
  // 기존 동일 타입 있으면 업데이트
  const {data:existing}=await supabaseClient.from('upbo_tasks').select('*').eq('member_id',memberId).eq('task_type_id',typeId).single();
  if(existing){
    await supabaseClient.from('upbo_tasks').update({quantity:existing.quantity+qty,memo:memo||existing.memo}).eq('id',existing.id);
  } else {
    await supabaseClient.from('upbo_tasks').insert([{member_id:memberId,task_type_id:typeId,quantity:qty,memo}]);
  }
  toast('✅ 업보 할당됨');
  document.getElementById('taskQty').value='1';
  document.getElementById('taskMemo').value='';
}

async function publishOverlay(){
  const title=document.getElementById('ovTitle').value.trim();
  const artist=document.getElementById('ovArtist').value.trim();
  if(!title){ toast('곡 제목을 입력해주세요'); return; }

  // recent_overlays 최대 5개 유지
  const {data:existing}=await supabaseClient.from('recent_overlays').select('id').order('played_at',{ascending:true});
  if(existing && existing.length>=5){
    await supabaseClient.from('recent_overlays').delete().eq('id',existing[0].id);
  }
  await supabaseClient.from('recent_overlays').insert([{song_title:title,song_artist:artist||null,played_at:new Date().toISOString()}]);

  const st=document.getElementById('ovStatus');
  st.textContent='ON'; st.className='overlay-status on';
  toast('🎤 오버레이: '+title);
  loadOverlayHistory();
}

async function hideOverlay(){
  const st=document.getElementById('ovStatus');
  st.textContent='OFF'; st.className='overlay-status off';
  toast('오버레이 숨김');
}

async function deleteOverlay(id){
  await supabaseClient.from('recent_overlays').delete().eq('id',id);
  toast('삭제됐어요'); loadOverlayHistory();
}

function pickRandomOverlay(){
  const songs=window._allSongsForRandom||[];
  if(!songs.length){ toast('곡 데이터를 먼저 불러주세요'); return; }
  const s=songs[Math.floor(Math.random()*songs.length)];
  document.getElementById('ovTitle').value=s.title;
  document.getElementById('ovArtist').value=s.artist;
}

// ── INIT ──
function initAll(){
  const today=new Date().toISOString().split('T')[0].slice(0,7);
  document.getElementById('sFilter').value=today;
  initStars('addStars','songLevel');
  loadSchedules();
  loadSongs();
  loadWork();
  loadOverlayHistory();
}
</script>
</body>
</html>

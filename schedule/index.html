<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판다율 🐼 스케줄</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<style>
/* ── TYPE COLORS ── */
:root {
  --c-broadcast:  #A78BDB;
  --c-rest:       #C0B6D6;
  --c-event:      #F9A8D4;
  --c-collab:     #86EFAC;
  --c-tournament: #93C5FD;
  --c-other:      #FCD34D;
}

/* ── MONTH NAV ── */
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.month-nav h2 {
  font-family: 'Nunito', sans-serif;
  font-size: 22px; font-weight: 900; color: var(--text);
}
.nav-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; color: var(--lav-dk);
  box-shadow: 0 2px 8px var(--shadow);
}
.nav-btn:hover { background: var(--lav-lt); border-color: var(--lav); transform: scale(1.05); }

/* ── LEGEND ── */
.legend {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 20px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-sub); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* ── CALENDAR GRID (desktop) ── */
.cal-wrap { display: block; }
.cal-header-row {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 4px;
  margin-bottom: 4px;
}
.cal-header-cell {
  text-align: center; font-size: 12px; font-weight: 700;
  color: var(--text-sub); padding: 6px 0;
}
.cal-header-cell:first-child { color: var(--c-event); }
.cal-header-cell:last-child  { color: var(--c-tournament); }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-cell {
  min-height: 88px; background: var(--surface);
  border: 1px solid rgba(216,201,255,.2); border-radius: 12px;
  padding: 6px 8px; transition: all .2s; cursor: default;
}
.cal-cell:hover { border-color: var(--lav); box-shadow: 0 4px 14px var(--shadow); }
.cal-cell.empty { background: transparent; border-color: transparent; }
.cal-cell.empty:hover { box-shadow: none; }
.cal-cell.today { border-color: var(--lav-dk); box-shadow: 0 0 0 1.5px var(--lav-dk); }
.cal-cell.past { opacity: .45; }
.cal-day-num { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.cal-cell:nth-child(7n+1) .cal-day-num { color: var(--c-event); }
.cal-cell:nth-child(7n)   .cal-day-num { color: var(--c-tournament); }
.cal-event {
  font-size: 11px; padding: 2px 6px; border-radius: 6px;
  margin-bottom: 2px; color: #fff; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; transition: opacity .2s;
}
.cal-event:hover { opacity: .85; }
.cal-event.highlight { animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(167,139,219,.4); }
  50%      { box-shadow: 0 0 10px 4px rgba(167,139,219,.4); }
}

/* ── LIST VIEW (mobile) ── */
.list-wrap { display: none; }
.list-group { margin-bottom: 16px; }
.list-date-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; padding: 0 4px;
}
.list-day-badge {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border);
  font-weight: 800; font-size: 15px; line-height: 1; color: var(--text);
}
.list-day-badge.today { background: var(--lav-dk); color: #fff; border-color: var(--lav-dk); }
.list-day-badge.sun { color: var(--c-event); }
.list-day-badge.sat { color: var(--c-tournament); }
.list-day-badge.today.sun, .list-day-badge.today.sat { color: #fff; }
.list-dow { font-size: 12px; color: var(--text-sub); font-weight: 600; }
.list-event {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 14px;
  margin-bottom: 6px; cursor: pointer; transition: all .2s;
  box-shadow: 0 2px 8px var(--shadow);
}
.list-event:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow); border-color: var(--lav); }
.list-bar { width: 3px; height: 32px; border-radius: 2px; flex-shrink: 0; }
.list-title { font-size: 14px; font-weight: 600; }
.list-time  { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.list-group.past { opacity: .45; }

.today-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0 14px;
}
.today-divider::before, .today-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--lav-dk), transparent);
}
.today-divider span {
  font-size: 11px; font-weight: 800; color: var(--lav-dk);
  letter-spacing: 1.5px;
}

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(61,47,96,.25); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal-box {
  background: var(--surface); border-radius: 22px;
  padding: 28px; max-width: 380px; width: 90%;
  box-shadow: 0 20px 60px rgba(61,47,96,.2);
  border: 1.5px solid var(--border);
}
.modal-close {
  float: right; background: none; border: none;
  font-size: 18px; cursor: pointer; color: var(--text-mut);
}
.modal-close:hover { color: var(--text); }

@media (max-width: 768px) {
  .cal-wrap  { display: none; }
  .list-wrap { display: block; }
  .legend    { display: none; }
}
</style>
</head>
<body>

<nav class="nav-bar">
  <div class="nav-inner-wrap">
    <a href="/">홈</a>
    <a href="/schedule/" class="active">스케줄</a>
    <a href="/song/">노래책</a>
    <a href="/work/">업보</a>
    <a href="https://www.sooplive.com/station/yuri3340" target="_blank">방송국</a>
  </div>
</nav>

<div class="page-wrap">
  <!-- Month Nav -->
  <div class="month-nav fade-up">
    <button class="nav-btn" onclick="changeMonth(-1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="calMonth"></h2>
    <button class="nav-btn" onclick="changeMonth(1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- Legend -->
  <div class="legend fade-up">
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-broadcast)"></div>방송</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-rest)"></div>휴방</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-event)"></div>이벤트</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-collab)"></div>합방</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-tournament)"></div>대회</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-other)"></div>기타</div>
  </div>

  <!-- Desktop: Calendar -->
  <div class="cal-wrap fade-up">
    <div class="cal-header-row">
      <div class="cal-header-cell">일</div><div class="cal-header-cell">월</div>
      <div class="cal-header-cell">화</div><div class="cal-header-cell">수</div>
      <div class="cal-header-cell">목</div><div class="cal-header-cell">금</div>
      <div class="cal-header-cell">토</div>
    </div>
    <div class="cal-grid" id="calBody"></div>
  </div>

  <!-- Mobile: List -->
  <div class="list-wrap fade-up" id="listBody"></div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="eventModal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="document.getElementById('eventModal').classList.remove('open')">✕</button>
    <div style="margin-bottom:14px">
      <span id="modalDot" style="display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle"></span>
      <span id="modalType" style="font-size:11px;color:var(--text-sub);letter-spacing:1px;text-transform:uppercase"></span>
    </div>
    <div id="modalTitle" style="font-size:18px;font-weight:800;margin-bottom:8px;color:var(--text)"></div>
    <div id="modalDate" style="font-size:13px;color:var(--text-sub);margin-bottom:4px"></div>
    <div id="modalTime" style="font-size:13px;color:var(--text-sub);margin-bottom:10px"></div>
    <div id="modalDesc" style="font-size:13px;color:var(--text);line-height:1.7"></div>
  </div>
</div>

<footer class="page-footer">© 2026 판다율</footer>

<script src="/js/supabase-config.js"></script>
<script>
const DOW = ['일','월','화','수','목','금','토'];
const TYPE_COLORS = { broadcast:'#A78BDB', rest:'#C0B6D6', event:'#F9A8D4', collab:'#86EFAC', tournament:'#93C5FD', other:'#FCD34D' };
const TYPE_LABELS = { broadcast:'방송', rest:'휴방', event:'이벤트', collab:'합방', tournament:'대회', other:'기타' };

let currentYear, currentMonth, schedules = [];

function init() {
  const n = new Date();
  currentYear = n.getFullYear();
  currentMonth = n.getMonth();
  loadMonth();
}

async function loadMonth() {
  document.getElementById('calMonth').textContent = `${currentYear}년 ${currentMonth+1}월`;
  const s = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
  const last = new Date(currentYear, currentMonth+1, 0).getDate();
  const e = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  try {
    const { data, error } = await supabaseClient.from('schedules').select('*')
      .gte('event_date', s).lte('event_date', e)
      .order('event_date').order('event_time');
    if (error) throw error;
    schedules = data || [];
  } catch(e) { schedules = []; }
  renderCalendar();
  renderList();
}

function renderCalendar() {
  const body = document.getElementById('calBody');
  body.innerHTML = '';
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) body.innerHTML += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
    const isPast = new Date(ds+'T23:59:59') < today && !isToday;
    const dayEvs = schedules.filter(s => s.event_date === ds);

    let evHtml = '';
    dayEvs.forEach(ev => {
      const c = ev.color || TYPE_COLORS[ev.event_type] || '#A78BDB';
      const t = ev.event_time ? ev.event_time.slice(0,2).replace(/^0/,'')+'시 ' : '';
      evHtml += `<div class="cal-event${ev.highlight?' highlight':''}" style="background:${c}" onclick="showEvent('${ev.id}')">${t}${ev.title}</div>`;
    });

    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (isPast)  cls += ' past';
    body.innerHTML += `<div class="${cls}"><div class="cal-day-num">${d}</div>${evHtml}</div>`;
  }
}

function renderList() {
  const body = document.getElementById('listBody');
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const isCurMonth = today.getFullYear()===currentYear && today.getMonth()===currentMonth;
  let html = '', todayInserted = false;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvs = schedules.filter(s => s.event_date === ds);
    if (!dayEvs.length) continue;

    const dt = new Date(currentYear, currentMonth, d);
    const dow = dt.getDay();
    const isToday = isCurMonth && today.getDate()===d;
    const isPast  = ds < todayStr;

    if (isCurMonth && !todayInserted && ds >= todayStr) {
      html += `<div class="today-divider" id="todayAnchor"><span>TODAY</span></div>`;
      todayInserted = true;
    }

    let badge = 'list-day-badge';
    if (isToday) badge += ' today';
    if (dow===0) badge += ' sun';
    if (dow===6) badge += ' sat';

    html += `<div class="list-group${isPast?' past':''}">
      <div class="list-date-row">
        <div class="${badge}">${d}</div>
        <div class="list-dow">${DOW[dow]}요일${isToday?' · 오늘':''}</div>
      </div>`;

    dayEvs.forEach(ev => {
      const c = ev.color || TYPE_COLORS[ev.event_type] || '#A78BDB';
      const l = TYPE_LABELS[ev.event_type] || ev.event_type;
      const t = ev.event_time ? ev.event_time.slice(0,5) : '';
      html += `<div class="list-event" onclick="showEvent('${ev.id}')">
        <div class="list-bar" style="background:${c}"></div>
        <div style="flex:1">
          <div class="list-title">${ev.title}</div>
          ${t?`<div class="list-time">${t}</div>`:''}
        </div>
        <span class="badge" style="background:${c}22;color:${c}">${l}</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (!html) html = '<div class="empty-box">이번 달 일정이 없어요 🐼</div>';
  body.innerHTML = html;
  setTimeout(() => {
    const a = document.getElementById('todayAnchor');
    if (a) a.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

function showEvent(id) {
  const ev = schedules.find(s => String(s.id)===String(id));
  if (!ev) return;
  const c = ev.color || TYPE_COLORS[ev.event_type] || '#A78BDB';
  const l = TYPE_LABELS[ev.event_type] || ev.event_type;
  const dt = new Date(ev.event_date+'T00:00:00');
  document.getElementById('modalDot').style.background = c;
  document.getElementById('modalType').textContent = l;
  document.getElementById('modalTitle').textContent = ev.title;
  document.getElementById('modalDate').textContent = `${currentYear}년 ${dt.getMonth()+1}월 ${dt.getDate()}일 (${DOW[dt.getDay()]})`;
  document.getElementById('modalTime').textContent = ev.event_time ? ev.event_time.slice(0,5) : '';
  document.getElementById('modalDesc').textContent = ev.description || '';
  document.getElementById('eventModal').classList.add('open');
}

function closeModal(e) { if (e.target===e.currentTarget) document.getElementById('eventModal').classList.remove('open'); }
function changeMonth(o) {
  currentMonth += o;
  if (currentMonth < 0)  { currentMonth=11; currentYear--; }
  if (currentMonth > 11) { currentMonth=0;  currentYear++; }
  loadMonth();
}

// fade-up
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:.1});
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

init();
</script>
</body>
</html>
